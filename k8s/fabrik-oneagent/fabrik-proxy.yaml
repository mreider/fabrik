apiVersion: apps/v1
kind: Deployment
metadata:
  name: fabrik-proxy
  namespace: fabrik-oneagent
  labels:
    app: fabrik-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fabrik-proxy
  template:
    metadata:
      labels:
        app: fabrik-proxy
      annotations:
        dynatrace.com/inject: "true"
    spec:
      containers:
      - name: fabrik-proxy
        image: ghcr.io/mreider/fabrik-proxy-oneagent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: DT_SERVICE_NAME
          value: "fabrik-proxy-oneagent"
        - name: FABRIK_SERVICE_URL
          value: "http://fabrik-service.fabrik-oneagent:8080"
        - name: RABBITMQ_HOST
          value: "rabbitmq.fabrik-oneagent"
        - name: RABBITMQ_USER
          value: "fabrik"
        - name: RABBITMQ_PASSWORD
          value: "fabrik123"
        # Disable OpenTelemetry for OneAgent-only setup
        - name: OTEL_SDK_DISABLED
          value: "true"
        resources:
          limits:
            cpu: "300m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: fabrik-proxy
  namespace: fabrik-oneagent
spec:
  selector:
    app: fabrik-proxy
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP