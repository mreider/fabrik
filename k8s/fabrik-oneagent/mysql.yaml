apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: fabrik-oneagent
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
      annotations:
        dynatrace.com/inject: "true"
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "fabrik123"
        - name: MYSQL_DATABASE
          value: "fabrik"
        - name: MYSQL_USER
          value: "fabrik"
        - name: MYSQL_PASSWORD
          value: "fabrik123"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        volumeMounts:
        - name: mysql-init
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: mysql-init
        configMap:
          name: mysql-init-script
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-script
  namespace: fabrik-oneagent
data:
  init.sql: |
    USE fabrik;
    CREATE TABLE IF NOT EXISTS users (
        id INT AUTO_INCREMENT PRIMARY KEY,
        username VARCHAR(50) NOT NULL,
        email VARCHAR(100) NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    CREATE TABLE IF NOT EXISTS orders (
        id INT AUTO_INCREMENT PRIMARY KEY,
        user_id INT,
        product_name VARCHAR(100) NOT NULL,
        quantity INT NOT NULL,
        total_amount DECIMAL(10,2) NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (user_id) REFERENCES users(id)
    );
    INSERT INTO users (username, email) VALUES
        ('demo_user_1', 'user1@fabrik.demo'),
        ('demo_user_2', 'user2@fabrik.demo'),
        ('demo_user_3', 'user3@fabrik.demo');
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: fabrik-oneagent
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
  type: ClusterIP