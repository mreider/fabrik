apiVersion: apps/v1
kind: Deployment
metadata:
  name: fabrik-service
  namespace: fabrik-oneagent
  labels:
    app: fabrik-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fabrik-service
  template:
    metadata:
      labels:
        app: fabrik-service
      annotations:
        dynatrace.com/inject: "true"
    spec:
      containers:
      - name: fabrik-service
        image: ghcr.io/mreider/fabrik-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: REDIS_HOST
          value: "redis.fabrik-oneagent"
        - name: REDIS_PORT
          value: "6379"
        - name: DT_SERVICE_NAME
          value: "fabrik-service-oneagent"
        # Disable OpenTelemetry for OneAgent-only setup
        - name: OTEL_SDK_DISABLED
          value: "true"
        resources:
          limits:
            cpu: "400m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: fabrik-service
  namespace: fabrik-oneagent
spec:
  selector:
    app: fabrik-service
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP