apiVersion: apps/v1
kind: Deployment
metadata:
  name: fabrik-proxy
  namespace: fabrik-otel
  labels:
    app: fabrik-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fabrik-proxy
  template:
    metadata:
      labels:
        app: fabrik-proxy
      annotations:
        dynatrace.com/inject: "false"
    spec:
      containers:
      - name: fabrik-proxy
        image: ghcr.io/mreider/fabrik-proxy-otel:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: FABRIK_SERVICE_URL
          value: "http://fabrik-service.fabrik-otel:8080"
        - name: RABBITMQ_HOST
          value: "rabbitmq.fabrik-otel"
        - name: RABBITMQ_USER
          value: "fabrik"
        - name: RABBITMQ_PASSWORD
          value: "fabrik123"
        # OpenTelemetry configuration with enrichment
        - name: OTEL_SDK_DISABLED
          value: "false"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "http/protobuf"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: dynatrace-secret
              key: endpoint
        - name: OTEL_EXPORTER_OTLP_HEADERS
          valueFrom:
            secretKeyRef:
              name: dynatrace-secret
              key: headers
        - name: OTEL_SERVICE_NAME
          value: "fabrik-proxy-otel"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=fabrik-proxy-otel,service.version=1.0.0,service.namespace=fabrik"
        resources:
          limits:
            cpu: "300m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: fabrik-proxy
  namespace: fabrik-otel
spec:
  selector:
    app: fabrik-proxy
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP