---
# MySQL Database for Fabrik-1 (OneAgent)
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-script
  namespace: fabrik-1
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS fabrik;
    CREATE USER IF NOT EXISTS 'fabrik'@'%' IDENTIFIED BY 'fabrik123';
    GRANT ALL PRIVILEGES ON fabrik.* TO 'fabrik'@'%';
    FLUSH PRIVILEGES;

    USE fabrik;

    CREATE TABLE IF NOT EXISTS orders (
      id VARCHAR(36) PRIMARY KEY,
      customer_name VARCHAR(255) NOT NULL,
      product_name VARCHAR(255) NOT NULL,
      quantity INT NOT NULL,
      total_amount DECIMAL(10,2) NOT NULL,
      status ENUM('pending', 'fulfilled', 'failed') DEFAULT 'pending',
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    );
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: fabrik-1
  labels:
    app: mysql
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
        tier: database
      annotations:
        # OneAgent will be injected automatically
        dynatrace.com/inject: "true"
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "root123"
        - name: MYSQL_DATABASE
          value: "fabrik"
        - name: MYSQL_USER
          value: "fabrik"
        - name: MYSQL_PASSWORD
          value: "fabrik123"
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-init
          mountPath: /docker-entrypoint-initdb.d
        - name: mysql-data
          mountPath: /var/lib/mysql
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          exec:
            command:
            - mysql
            - -h
            - localhost
            - -u
            - fabrik
            - -pfabrik123
            - -e
            - "SELECT 1"
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: mysql-init
        configMap:
          name: mysql-init-script
      - name: mysql-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: fabrik-1
spec:
  selector:
    app: mysql
  ports:
  - name: mysql
    port: 3306
    targetPort: 3306
  type: ClusterIP
---
