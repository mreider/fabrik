---
# NGINX Configuration for Fabrik-1 (OneAgent)
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: fabrik-1
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log notice;
    pid /var/run/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        '"$http_traceparent" "$http_tracestate"';

        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        keepalive_timeout 65;
        gzip on;

        upstream fabrik_orders {
            server fabrik-orders.fabrik-1:3000;
        }

        server {
            listen 80;
            server_name nginx-oneagent;

            # Health check
            location /nginx-health {
                access_log off;
                return 200 "nginx healthy - oneagent\n";
                add_header Content-Type text/plain;
            }

            # Proxy orders requests
            location /orders {
                proxy_pass http://fabrik_orders/orders;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Nginx-Proxy true;

                # Preserve tracing headers
                proxy_pass_header X-Dynatrace;
                proxy_pass_header Traceparent;
                proxy_pass_header Tracestate;

                proxy_connect_timeout 30s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
            }

            # Default location
            location / {
                return 404 "Not Found - Use /orders endpoint";
                add_header Content-Type text/plain;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: fabrik-1
  labels:
    app: nginx
    tier: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        tier: proxy
      annotations:
        # OneAgent will be injected automatically via namespace label
        dynatrace.com/inject: "true"
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          limits:
            cpu: "200m"
            memory: "128Mi"
          requests:
            cpu: "100m"
            memory: "64Mi"
        livenessProbe:
          httpGet:
            path: /nginx-health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /nginx-health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: fabrik-1
spec:
  selector:
    app: nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP
---
# NGINX Configuration for Fabrik-2 (OpenTelemetry)
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: fabrik-2
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log notice;
    pid /var/run/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        '"$http_traceparent" "$http_tracestate"';

        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        keepalive_timeout 65;
        gzip on;

        upstream fabrik_orders {
            server fabrik-orders.fabrik-2:3000;
        }

        server {
            listen 80;
            server_name nginx-otel;

            # Health check
            location /nginx-health {
                access_log off;
                return 200 "nginx healthy - opentelemetry\n";
                add_header Content-Type text/plain;
            }

            # Proxy orders requests
            location /orders {
                proxy_pass http://fabrik_orders/orders;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Nginx-Proxy true;

                # Preserve tracing headers for OpenTelemetry
                proxy_pass_header Traceparent;
                proxy_pass_header Tracestate;
                proxy_pass_header Baggage;

                proxy_connect_timeout 30s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
            }

            # Default location
            location / {
                return 404 "Not Found - Use /orders endpoint";
                add_header Content-Type text/plain;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: fabrik-2
  labels:
    app: nginx
    tier: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        tier: proxy
      annotations:
        # Disable OneAgent injection - using OpenTelemetry
        dynatrace.com/inject: "false"
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        env:
        # OpenTelemetry configuration for nginx (if using OTel nginx module)
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: dynatrace-secret
              key: endpoint
        - name: OTEL_SERVICE_NAME
          value: "nginx-otel"
        - name: OTEL_SERVICE_NAMESPACE
          value: "fabrik"
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          limits:
            cpu: "200m"
            memory: "128Mi"
          requests:
            cpu: "100m"
            memory: "64Mi"
        livenessProbe:
          httpGet:
            path: /nginx-health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /nginx-health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: fabrik-2
spec:
  selector:
    app: nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP