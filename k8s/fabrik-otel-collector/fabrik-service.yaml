apiVersion: apps/v1
kind: Deployment
metadata:
  name: fabrik-service
  namespace: fabrik-otel-collector
  labels:
    app: fabrik-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fabrik-service
  template:
    metadata:
      labels:
        app: fabrik-service
      annotations:
        dynatrace.com/inject: "false"
    spec:
      containers:
      - name: fabrik-service
        image: ghcr.io/mreider/fabrik-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: REDIS_HOST
          value: "redis.fabrik-otel-collector"
        - name: REDIS_PORT
          value: "6379"
        # For manual OpenTelemetry setup in the application code
        - name: DYNATRACE_ENDPOINT
          value: "http://otel-collector.fabrik-otel-collector:4318"
        - name: DYNATRACE_API_TOKEN
          value: ""  # Not needed for collector endpoint
        # Also set standard OTEL env vars for consistency
        - name: OTEL_SDK_DISABLED
          value: "false"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "http/protobuf"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.fabrik-otel-collector:4318"
        - name: OTEL_SERVICE_NAME
          value: "fabrik-service-otel-collector"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=fabrik-service-otel-collector,service.version=1.0.0"
        resources:
          limits:
            cpu: "400m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: fabrik-service
  namespace: fabrik-otel-collector
spec:
  selector:
    app: fabrik-service
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP