apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: fabrik-otel-collector
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"
      kubeletstats:
        collection_interval: 40s
        auth_type: serviceAccount
        endpoint: "${env:K8S_NODE_IP}:10250"
        insecure_skip_verify: true
        metric_groups:
          - node
          - pod
          - container

    processors:
      filter/severity:
        logs:
          log_record:
            - severity_number < SEVERITY_NUMBER_ERROR
      memory_limiter:
        check_interval: 1s
        limit_percentage: 70
        spike_limit_percentage: 20
      batch:
        timeout: 10s
        send_batch_size: 10000
      k8sattributes:
        passthrough: false
        auth_type: "serviceAccount"
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.node.name
            - k8s.namespace.name
            - k8s.pod.start_time
            - k8s.replicaset.name
            - k8s.replicaset.uid
            - k8s.daemonset.name
            - k8s.daemonset.uid
            - k8s.job.name
            - k8s.job.uid
            - k8s.cronjob.name
            - k8s.statefulset.name
            - k8s.statefulset.uid
            - k8s.container.name
            - container.image.name
            - container.image.tag
            - container.id
          labels:
            - tag_name: kube_app_name
              key: app.kubernetes.io/name
              from: pod
            - tag_name: kube_app_instance
              key: app.kubernetes.io/instance
              from: pod
            - tag_name: kube_app_version
              key: app.kubernetes.io/version
              from: pod
            - tag_name: kube_app_component
              key: app.kubernetes.io/component
              from: pod
            - tag_name: kube_app_part_of
              key: app.kubernetes.io/part-of
              from: pod
            - tag_name: kube_app_managed_by
              key: app.kubernetes.io/managed-by
              from: pod

    exporters:
      otlphttp:
        endpoint: "${env:DYNATRACE_OTLP_ENDPOINT}"
        headers:
          Authorization: "Api-Token ${env:DYNATRACE_API_TOKEN}"
        tls:
          insecure: false
          insecure_skip_verify: false

    service:
      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - batch
          exporters:
            - otlphttp
        metrics:
          receivers:
            - otlp
            - kubeletstats
          processors:
            - memory_limiter
            - k8sattributes
            - batch
          exporters:
            - otlphttp
        logs:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - filter/severity
            - batch
          exporters:
            - otlphttp