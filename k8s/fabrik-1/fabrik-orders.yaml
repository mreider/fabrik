---
# Fabrik Orders Service - OneAgent Version
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fabrik-orders
  namespace: fabrik-1
  labels:
    app: fabrik-orders
    tier: backend
    instrumentation: oneagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fabrik-orders
  template:
    metadata:
      labels:
        app: fabrik-orders
        tier: backend
        instrumentation: oneagent
      annotations:
        # OneAgent injection enabled via namespace label
        dynatrace.com/inject: "true"
    spec:
      containers:
      - name: fabrik-orders
        image: ghcr.io/mreider/fabrik-orders-oneagent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: MYSQL_HOST
          value: "mysql.fabrik-1"
        - name: MYSQL_PORT
          value: "3306"
        - name: MYSQL_USER
          value: "fabrik"
        - name: MYSQL_PASSWORD
          value: "fabrik123"
        - name: MYSQL_DATABASE
          value: "fabrik"
        - name: RABBITMQ_URL
          value: "amqp://fabrik:fabrik123@rabbitmq.fabrik-1:5672"
        resources:
          limits:
            cpu: "400m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fabrik-orders
  namespace: fabrik-1
  labels:
    app: fabrik-orders
spec:
  selector:
    app: fabrik-orders
  ports:
  - name: http
    port: 3000
    targetPort: 3000
  type: ClusterIP