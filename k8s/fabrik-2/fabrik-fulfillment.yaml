---
# Fabrik Fulfillment Service - OpenTelemetry Version
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fabrik-fulfillment
  namespace: fabrik-2
  labels:
    app: fabrik-fulfillment
    tier: backend
    instrumentation: opentelemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fabrik-fulfillment
  template:
    metadata:
      labels:
        app: fabrik-fulfillment
        tier: backend
        instrumentation: opentelemetry
      annotations:
        # Disable OneAgent injection - using OpenTelemetry
        dynatrace.com/inject: "false"
        dynatrace.com/enrich: "true"
    spec:
      containers:
      - name: fabrik-fulfillment
        image: ghcr.io/mreider/fabrik-fulfillment-otel:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: MYSQL_HOST
          value: "mysql.fabrik-2"
        - name: MYSQL_PORT
          value: "3306"
        - name: MYSQL_USER
          value: "fabrik"
        - name: MYSQL_PASSWORD
          value: "fabrik123"
        - name: MYSQL_DATABASE
          value: "fabrik"
        - name: RABBITMQ_URL
          value: "amqp://fabrik:fabrik123@rabbitmq.fabrik-2:5672"
        # OpenTelemetry configuration
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: dynatrace-secret
              key: endpoint
        - name: DYNATRACE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: dynatrace-secret
              key: api-token
        - name: OTEL_EXPORTER_OTLP_HEADERS
          value: "Authorization=Api-Token $(DYNATRACE_API_TOKEN)"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "http/protobuf"
        - name: OTEL_SERVICE_NAME
          value: "fabrik-fulfillment-otel"
        - name: OTEL_SERVICE_VERSION
          value: "1.0.0"
        - name: OTEL_SERVICE_NAMESPACE
          value: "fabrik"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=fabrik-fulfillment-otel,service.version=1.0.0,service.namespace=fabrik"
        resources:
          limits:
            cpu: "400m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fabrik-fulfillment
  namespace: fabrik-2
  labels:
    app: fabrik-fulfillment
spec:
  selector:
    app: fabrik-fulfillment
  ports:
  - name: http
    port: 3001
    targetPort: 3001
  type: ClusterIP