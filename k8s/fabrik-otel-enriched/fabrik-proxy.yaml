apiVersion: apps/v1
kind: Deployment
metadata:
  name: fabrik-proxy
  namespace: fabrik-otel-enriched
  labels:
    app: fabrik-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fabrik-proxy
  template:
    metadata:
      labels:
        app: fabrik-proxy
      annotations:
        dynatrace.com/inject: "false"
    spec:
      containers:
      - name: fabrik-proxy
        image: ghcr.io/mreider/fabrik-proxy:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: FABRIK_SERVICE_URL
          value: "http://fabrik-service.fabrik-otel-enriched:8080"
        - name: DYNATRACE_ENDPOINT
          value: "https://dynakube-activegate.dynatrace:443"
        - name: DYNATRACE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: dynatrace-secret
              key: api-token
        # OpenTelemetry configuration with enrichment
        - name: OTEL_SDK_DISABLED
          value: "false"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "http/protobuf"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "https://dynakube-activegate.dynatrace:443/otlp"
        - name: OTEL_SERVICE_NAME
          value: "fabrik-proxy-otel-enriched"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=fabrik-proxy-otel-enriched,service.version=1.0.0"
        resources:
          limits:
            cpu: "300m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: fabrik-proxy
  namespace: fabrik-otel-enriched
spec:
  selector:
    app: fabrik-proxy
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP