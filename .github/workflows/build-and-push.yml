name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: mreider

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build OpenTelemetry-instrumented images (default)
      - name: Build and push fabrik-orders-otel image
        uses: docker/build-push-action@v4
        with:
          context: ./src/fabrik-orders
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/fabrik-orders-otel:latest

      - name: Build and push fabrik-fulfillment-otel image
        uses: docker/build-push-action@v4
        with:
          context: ./src/fabrik-fulfillment
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/fabrik-fulfillment-otel:latest

      - name: Build and push load-generator image
        uses: docker/build-push-action@v4
        with:
          context: ./src/load-generator
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/fabrik-load-generator:latest

      # Build OneAgent-only images (no OpenTelemetry dependencies)
      - name: Build and push fabrik-orders-oneagent image
        uses: docker/build-push-action@v4
        with:
          context: ./src/fabrik-orders
          file: ./src/fabrik-orders/Dockerfile.oneagent
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/fabrik-orders-oneagent:latest

      - name: Build and push fabrik-fulfillment-oneagent image
        uses: docker/build-push-action@v4
        with:
          context: ./src/fabrik-fulfillment
          file: ./src/fabrik-fulfillment/Dockerfile.oneagent
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/fabrik-fulfillment-oneagent:latest
