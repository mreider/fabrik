exporter = "otlp"
processor = "batch"

[exporters.otlp]
host = "abl46885.dev.dynatracelabs.com"
port = 443
endpoint = "/api/v2/otlp"
insecure = false

[exporters.otlp.headers]
"Authorization" = "Api-Token ${DYNATRACE_API_TOKEN}"

[processors.batch]
max_queue_size = 2048
schedule_delay_millis = 5000
max_export_batch_size = 512

[service]
name = "nginx-otel-fabrik-2"
namespace = "fabrik"
version = "1.0.0"

[sampler]
name = "AlwaysOn"
ratio = 1.0
parent_based = false