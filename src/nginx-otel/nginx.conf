user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

# TODO: Load OpenTelemetry module when available
# load_module modules/ngx_http_opentelemetry_module.so;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # TODO: OpenTelemetry configuration when module is available
    # opentelemetry_config /etc/nginx/opentelemetry.toml;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '"$http_traceparent" "$http_tracestate"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;

    upstream fabrik_orders {
        server fabrik-orders.fabrik-2:3000;
    }

    server {
        listen 80;
        server_name nginx-otel;

        # Health check
        location /nginx-health {
            access_log off;
            opentelemetry off;
            return 200 "nginx healthy - opentelemetry\n";
            add_header Content-Type text/plain;
        }

        # Proxy orders requests
        location /orders {
            # TODO: OpenTelemetry directives when module is available
            # opentelemetry_operation_name "nginx_proxy_orders";
            # opentelemetry_propagate;
            # opentelemetry_attribute "http.request.method" "$request_method";

            proxy_pass http://fabrik_orders/orders;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Nginx-Proxy true;

            # Preserve tracing headers for OpenTelemetry
            proxy_pass_header Traceparent;
            proxy_pass_header Tracestate;
            proxy_pass_header Baggage;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # API proxy
        location /api/ {
            # TODO: OpenTelemetry directives when module is available
            # opentelemetry_operation_name "nginx_proxy_api";
            # opentelemetry_propagate;

            proxy_pass http://fabrik_orders/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Nginx-Proxy true;

            # Preserve tracing headers for OpenTelemetry
            proxy_pass_header Traceparent;
            proxy_pass_header Tracestate;
            proxy_pass_header Baggage;
        }

        # Default location
        location / {
            # TODO: OpenTelemetry directives when module is available
            # opentelemetry_operation_name "nginx_default";
            return 404 "Not Found - Use /orders endpoint";
            add_header Content-Type text/plain;
        }
    }
}