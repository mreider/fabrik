syntax = "proto3";

package com.fabrik.proto;

option java_multiple_files = true;
option java_package = "com.fabrik.proto";
option java_outer_classname = "OrderProto";

service OrderService {
  rpc PlaceOrder (OrderRequest) returns (OrderResponse) {}
}

service ShippingService {
  rpc ShipOrder (ShipmentRequest) returns (ShipmentResponse) {}
}

message OrderRequest {
  string item = 1;
  int32 quantity = 2;
}

message OrderResponse {
  string orderId = 1;
  string status = 2;
}

message ShipmentRequest {
  string orderId = 1;
  string item = 2;
  int32 quantity = 3;
}

message ShipmentResponse {
  string shipmentId = 1;
  string status = 2;
  string trackingNumber = 3;
}
